version: 0.2

phases:
  pre_build:
    commands:
      - echo "Starting build..."
  build:
    commands:
      - echo "Building Docker image..."
      - IMAGE_TAG=simple-app:latest
      - docker build -t $IMAGE_TAG .
  post_build:
    commands:
      - echo "Build finished!"

artifacts:
  files:
    - '**/*'